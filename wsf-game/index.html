<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>When Stars Fall</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%234A2472'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="game-header">
    <button id="toc-btn" aria-label="Table of Contents" style="display:none">Contents</button>
    <span class="header-star" aria-hidden="true">✦</span>
    <span class="header-title">When Stars Fall</span>
    <span class="header-divider" aria-hidden="true">·</span>
    <span class="header-sub">New York City, 1853</span>
    <span class="header-star" aria-hidden="true">✦</span>
  </header>

  <!-- Constellation scoreboard — click to open the log -->
  <div id="scoreboard" role="button" tabindex="0" aria-label="Open constellation log">
    <div class="score-row">
      <span class="score-label">With you</span>
      <span class="score-num" id="score-player">0</span>
    </div>
    <div class="score-row">
      <span class="score-label">Van der Zon</span>
      <span class="score-num" id="score-vdz">2</span>
    </div>
    <div class="score-row">
      <span class="score-label">Lunardis</span>
      <span class="score-num" id="score-lunardi">0</span>
    </div>
  </div>

  <main id="game">
    <div id="content" class="scene-content">
      <!-- Scene content is rendered here by engine.js -->
    </div>
  </main>

  <!-- Back button -->
  <button id="back-btn" aria-label="Go back" style="display:none">Back</button>

  <!-- Table of Contents overlay -->
  <div id="toc-overlay" role="dialog" aria-modal="true" aria-label="Table of Contents">
    <div id="toc-panel">
      <div id="toc-header">
        <p class="toc-heading">Chapters</p>
        <button id="toc-close" aria-label="Close">✕</button>
      </div>
      <div id="toc-list"></div>
    </div>
  </div>

  <!-- Constellation Log overlay -->
  <div id="clog-overlay" role="dialog" aria-modal="true" aria-label="Constellation Signatures">
    <div id="clog-panel">
      <div id="clog-header">
        <div>
          <p class="toc-heading">Constellations</p>
          <p id="clog-count" class="clog-count-line"></p>
        </div>
        <button id="clog-close" aria-label="Close">✕</button>
      </div>
      <div id="clog-list"></div>
    </div>
  </div>

  <script src="story.js"></script>
  <script src="engine.js"></script>

</body>
</html>
